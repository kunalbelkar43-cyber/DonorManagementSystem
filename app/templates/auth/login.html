<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>

<body>

<h1>Donor Management System</h1>

<form method="POST">

    {{ form.hidden_tag() }}

    <p>
        {{ form.username.label }}<br>
        {{ form.username(size=35) }}
    </p>

    <p>
        {{ form.password.label }}<br>
        {{ form.password(size=35) }}
    </p>

    <p>
        {{ form.submit() }}
    </p>

</form>

</body>
</html>
