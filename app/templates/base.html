<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>{% block title %}Donor Management System{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css"
          rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet">      

</head>

<body>

<div class="container-fluid">

    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 bg-dark text-white min-vh-100 p-3">

            <h3 class="text-center mb-4">
                Donor MS
            </h3>

            <hr>

            <ul class="nav flex-column">

                <li class="nav-item mb-2">
                    <a class="nav-link text-white"
                       href="{{ url_for('dashboard.index') }}">
                        <i class="bi bi-speedometer2"></i>
                        Dashboard
                    </a>
                </li>

                <li class="nav-item mb-2">
                    <a class="nav-link text-white"
                       href="{{ url_for('donors.list_donors') }}">
                        <i class="bi bi-people-fill"></i>
                        Donors
                    </a>
                </li>

                <li class="nav-item mb-2">
                    <a class="nav-link text-white"
                       href="{{ url_for('donations.list_donations') }}">
                        <i class="bi bi-cash-stack"></i>
                        Donations
                    </a>
                </li>

                <li class="nav-item mb-2">
                    <a class="nav-link text-white"
                       href="{{ url_for('reports.donation_reports') }}">
                        <i class="bi bi-bar-chart-fill"></i>
                        Donation Reports
                    </a>
                </li>

            </ul>

        </div>

        <!-- Main Content -->
        <div class="col-md-10 p-4">

            {% block content %}
            {% endblock %}

        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

</body>

</html>
